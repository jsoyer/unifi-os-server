name: Build and push linux-arm64

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      latest:
        required: false
        type: boolean
        default: false
      base_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "UniFi OS Server version"
        required: true
        type: string
      latest:
        description: "Set latest tag"
        required: false
        type: boolean
        default: false
      base_tag:
        description: "Base image tag (e.g., 0.0.54-linux-arm64)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}-linux-arm64
            type=raw,value=latest-linux-arm64,enable=${{ inputs.latest == true }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_TAG=${{ inputs.base_tag }}
            FIRMWARE_PLATFORM=linux-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
